get_levels:
    description: Get electricity price levels for today and tomorrow.
    fields:
        entity_id:
            selector:
                entity:
                    domain: sensor
            description: Energy Advisor price sensor entity id. Required when multiple entries are loaded.
        level_length:
            selector:
                number:
                    min: 0
                    max: 1440
                    step: 1
                    mode: box
                    unit_of_measurement: minutes
            description: Length in minutes for each level. 0 means same as NordPool.
